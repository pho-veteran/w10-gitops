apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: w10-lab
  source:
    repoURL: https://github.com/pho-veteran/w10-gitops.git
    targetRevision: main
    path: workloads/web-monitoring/overlays/lab
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
