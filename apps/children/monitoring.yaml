apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: w10-lab
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 72.9.1
    helm:
      releaseName: kube-prometheus-stack
      # Trimmed for a single-node minikube lab. The real memory savers are the disabled
      # components (node-exporter / kube-state-metrics) and dropped default rules - the
      # canary + SLO alerts only need the app's own http_requests_total. We keep modest
      # resource *requests* for scheduling but set NO memory limits, so a container is
      # never OOM-killed for exceeding a cap (the python dashboard sidecar needs ~128Mi
      # and was being killed by a 64Mi limit).
      valuesObject:
        defaultRules:
          create: false
        nodeExporter:
          enabled: false
        kubeStateMetrics:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeProxy:
          enabled: false
        prometheusOperator:
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
        grafana:
          adminPassword: admin
          persistence:
            enabled: false
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              searchNamespace: ALL
        alertmanager:
          enabled: true
          alertmanagerSpec:
            configSecret: alertmanager-gmail-config
            retention: 24h
            replicas: 1
            resources:
              requests:
                cpu: 10m
                memory: 48Mi
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleNamespaceSelector: {}
            retention: 6h
            retentionSize: 1GB
            scrapeInterval: 30s
            evaluationInterval: 30s
            replicas: 1
            resources:
              requests:
                cpu: 100m
                memory: 350Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
