apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: w10-lab-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pho-veteran/w10-gitops.git
    targetRevision: main
    path: apps/children
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
