apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: web-db-secret
  namespace: demo
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: web-db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: host
      remoteRef:
        key: RDS_MASTER_SECRET_ARN_PLACEHOLDER
        property: host
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: port
      remoteRef:
        key: RDS_MASTER_SECRET_ARN_PLACEHOLDER
        property: port
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: database
      remoteRef:
        key: RDS_MASTER_SECRET_ARN_PLACEHOLDER
        property: dbname
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: username
      remoteRef:
        key: RDS_MASTER_SECRET_ARN_PLACEHOLDER
        property: username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: password
      remoteRef:
        key: RDS_MASTER_SECRET_ARN_PLACEHOLDER
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
