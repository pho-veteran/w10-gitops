apiVersion: apps/v1
kind: Deployment
metadata:
  name: max-replicas-6
  namespace: demo
spec:
  replicas: 6
  selector:
    matchLabels:
      app: max-replicas-6
  template:
    metadata:
      labels:
        app: max-replicas-6
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: nginx:1.27.0
          command: ["sh", "-c", "sleep 3600"]
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
