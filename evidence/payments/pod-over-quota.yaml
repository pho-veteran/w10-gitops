apiVersion: v1
kind: Pod
metadata:
  name: over-quota
  namespace: payments
spec:
  restartPolicy: Never
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: "1500m"
          memory: 1536Mi
        limits:
          cpu: "1500m"
          memory: 1536Mi
