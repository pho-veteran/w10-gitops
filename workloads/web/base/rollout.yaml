apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: web
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: p2-w10-lab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 2
  revisionHistoryLimit: 3
  progressDeadlineAbort: true
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: p2-w10-lab
    spec:
      securityContext:
        runAsNonRoot: true
        # node:20-alpine's "node" user is uid/gid 1000. A numeric runAsUser lets the
        # kubelet verify non-root at container-create time (the image's `USER node` is a
        # name, which triggers CreateContainerConfigError under runAsNonRoot). fsGroup
        # keeps the /tmp emptyDir writable under readOnlyRootFilesystem.
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: w10-web
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: PROJECT_NAME
              value: p2-w10-lab
            - name: ENVIRONMENT
              value: lab
            - name: NODE_PORT
              value: "30080"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  strategy:
    canary:
      stableService: web
      canaryService: web-canary
      maxSurge: 1
      maxUnavailable: 0
      abortScaleDownDelaySeconds: 150
      analysis:
        templates:
          - templateName: web-canary-health
        args:
          - name: service-name
            value: web-canary
        startingStep: 1
      steps:
        - setWeight: 50
        - pause:
            duration: 4m
        - setWeight: 100
